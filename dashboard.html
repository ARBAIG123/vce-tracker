<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VCE Tracker</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <!-- Name Modal -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal-box">
      <img src="logo.png" class="modal-logo"/>
      <h2>Welcome to VCE Tracker</h2>
      <p>What should we call you?</p>
      <input type="text" id="nameInput" placeholder="Enter your name" maxlength="30"/>
      <button class="modal-btn" onclick="saveName()">Let's Go →</button>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div class="app" id="mainApp" style="display:none;">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-left">
        <img src="logo.png" class="nav-logo"/>
        <div>
          <div class="nav-title">VCE Tracker</div>
          <div class="nav-sub" id="navSub">Loading...</div>
        </div>
      </div>
      
    </nav>

    <!-- Semester Overview -->
    <div class="section">
      <div class="section-label">SEMESTER OVERVIEW</div>
      <div class="overview-grid" id="overviewGrid"></div>
    </div>

    <!-- Analytics -->
    <div class="section">
      <div class="section-label">ANALYTICS</div>
      <div class="analytics-grid">
        <div class="analytics-card">
          <div class="analytics-title">OVERALL ATTENDANCE</div>
          <div class="ring-container">
            <canvas id="overallRing" width="160" height="160"></canvas>
            <div class="ring-label">
              <div class="ring-pct" id="overallPct">--%</div>
              <div class="ring-sub" id="overallClasses">-- classes</div>
            </div>
          </div>
          <div class="analytics-status" id="overallStatus"></div>
        </div>

        <div class="analytics-card">
          <div class="analytics-title">CGPA</div>
          <div id="cgpaAnalytics"></div>
        </div>

        <div class="analytics-card">
          <div class="analytics-title">BUNK CALCULATOR</div>
          <div class="bunk-chips" id="bunkChips"></div>
          <div class="bunk-result" id="bunkResult"></div>
        </div>
      </div>
    </div>

    <!-- Attendance -->
    <div class="section">
      <div class="attendance-header">
        <div class="section-label">ATTENDANCE</div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterCards('all', this)">All</button>
          <button class="filter-tab" onclick="filterCards('safe', this)">Safe</button>
          <button class="filter-tab" onclick="filterCards('borderline', this)">Borderline</button>
          <button class="filter-tab" onclick="filterCards('risk', this)">At Risk</button>
        </div>
      </div>
      <div class="subjects-grid" id="subjectsGrid"></div>
    </div>

    <!-- Sign Out -->
    <div class="signout-section">
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>

  </div>

  <!-- Subject Detail Page -->
  <div class="detail-page" id="detailPage" style="display:none;">
    <nav class="navbar">
      <div class="nav-left">
        <button class="back-btn" onclick="closeDetail()">← Back</button>
        <div>
          <div class="nav-title" id="detailSubjectName">Subject</div>
          <div class="nav-sub" id="detailSubjectType">Theory</div>
        </div>
      </div>
    </nav>

    <div class="detail-content">
      <div class="detail-stats">
        <div class="detail-stat-card">
          <canvas id="detailRing" width="120" height="120"></canvas>
          <div class="detail-stat-info">
            <div class="detail-stat-label">ATTENDANCE</div>
            <div class="detail-stat-value" id="detailAttended">--/--</div>
            <div class="detail-stat-sub" id="detailStatus">--</div>
          </div>
        </div>
        <div class="detail-stat-card">
          <canvas id="marksRing" width="120" height="120"></canvas>
          <div class="detail-stat-info">
            <div class="detail-stat-label">OVERALL MARKS</div>
            <div class="detail-stat-value" id="detailMarks">0/0</div>
            <div class="detail-stat-sub" id="detailAssessments">0 assessments logged</div>
          </div>
        </div>
        <div class="detail-stat-card best-score-card">
          <div class="best-score-icon">🏆</div>
          <div class="detail-stat-info">
            <div class="detail-stat-label">BEST SCORE</div>
            <div class="detail-stat-value" id="detailBestScore">No data yet</div>
          </div>
        </div>
      </div>

      <!-- Assessments -->
      <div class="assessments-section">
        <div class="assessments-header">
          <div class="section-label">ASSESSMENTS</div>
          <button class="add-btn" onclick="toggleAddForm()">+ Add Assessment</button>
        </div>

        <!-- Add Form -->
        <div class="add-form" id="addForm" style="display:none;">
          <div class="form-row">
            <div class="form-group full">
              <label>Title *</label>
              <input type="text" id="formTitle" placeholder="e.g. Assignment 1, Quiz 2..."/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="formCategory">
              <option>Assignment</option>
              <option>Lab Record</option>
              <option>CAT-1</option>
              <option>CAT-2</option>
              <option>Semester</option>
              </select>
            </div>
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="formDate"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Marks Obtained *</label>
              <input type="number" id="formObtained" placeholder="e.g. 18"/>
            </div>
            <div class="form-group">
              <label>Out Of *</label>
              <input type="number" id="formOutOf" placeholder="e.g. 20"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>Notes</label>
              <input type="text" id="formNotes" placeholder="Optional notes..."/>
            </div>
          </div>
          <div class="form-actions">
            <button class="save-btn" onclick="saveAssessment()">Save</button>
            <button class="cancel-btn" onclick="toggleAddForm()">Cancel</button>
          </div>
        </div>

        <div id="assessmentsList"></div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
