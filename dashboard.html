<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VCE Tracker | Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Name Modal -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal-box">
      <img src="logo.png" class="modal-logo"/>
      <h2>Welcome to VCE Tracker</h2>
      <p>What should we call you?</p>
      <input type="text" id="nameInput" class="modal-input" placeholder="Enter your name" maxlength="30"/>
      <button class="modal-btn" id="saveNameBtn">Let's Go →</button>
    </div>
  </div>

  <div class="app" id="mainApp" style="display:none;opacity:0;">

    <!-- Top progress bar -->
    <div class="top-progress-bar" id="topProgressBar"></div>

    <nav class="dash-navbar">
      <div class="dash-nav-left">
        <img src="logo.png" class="dash-nav-logo"/>
        <div>
          <div class="dash-nav-title">VCE Tracker</div>
          <div class="dash-nav-sub" id="navSub">Loading...</div>
        </div>
      </div>
      <div class="dash-nav-right">
        <button class="theme-toggle" id="themeToggle">🌙</button>
      </div>
    </nav>

    <!-- Greeting Banner -->
    <div class="greeting-banner" id="greetingBanner"></div>

    <!-- Overview -->
    <div class="dash-section fade-section">
      <div class="dash-section-label">Semester Overview</div>
      <div class="overview-grid" id="overviewGrid"></div>
    </div>

    <!-- Analytics -->
    <div class="dash-section fade-section" style="margin-top:1.5rem;">
      <div class="dash-section-label">Analytics</div>
      <div class="analytics-grid">
        <div class="analytics-card">
          <div class="analytics-title">Overall Attendance</div>
          <div class="ring-container">
            <canvas id="overallRing" width="130" height="130"></canvas>
            <div class="ring-label">
              <div class="ring-pct" id="overallPct">--%</div>
              <div class="ring-sub" id="overallClasses">--</div>
            </div>
          </div>
          <div class="analytics-status" id="overallStatus"></div>
        </div>
        <div class="analytics-card">
          <div class="analytics-title">CGPA</div>
          <div id="cgpaAnalytics"></div>
        </div>
        <div class="analytics-card">
          <div class="analytics-title">Bunk Calculator</div>
          <div class="bunk-chips" id="bunkChips"></div>
          <div class="bunk-result" id="bunkResult">
            <span style="color:var(--text3);font-size:0.82rem;">Select a subject above</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Attendance -->
    <div class="attendance-header fade-section">
      <div class="dash-section-label" style="margin:0;">Attendance</div>
      <div class="filter-tabs">
        <button class="filter-tab active" id="tabAll">All</button>
        <button class="filter-tab" id="tabSafe">Safe</button>
        <button class="filter-tab" id="tabBorderline">Borderline</button>
        <button class="filter-tab" id="tabRisk">At Risk</button>
      </div>
    </div>
    <div class="subjects-grid" id="subjectsGrid"></div>

    <div class="signout-section">
      <button class="signout-btn" id="signOutBtn">Sign Out</button>
    </div>

  </div>

  <!-- Subject Detail -->
  <div class="detail-page" id="detailPage" style="display:none;">
    <nav class="dash-navbar">
      <div class="dash-nav-left">
        <button class="back-btn" id="backBtn">← Back</button>
        <div>
          <div class="dash-nav-title" id="detailSubjectName">Subject</div>
          <div class="dash-nav-sub" id="detailSubjectType">Theory</div>
        </div>
      </div>
      <div class="dash-nav-right">
        <button class="theme-toggle" id="themeToggle2">🌙</button>
      </div>
    </nav>

    <div class="detail-content">
      <div class="detail-stats">
        <div class="detail-stat-card">
          <canvas id="detailRing" width="90" height="90"></canvas>
          <div class="detail-stat-info">
            <div class="detail-stat-label">Attendance</div>
            <div class="detail-stat-value" id="detailAttended">--/--</div>
            <div class="detail-stat-sub" id="detailStatus">--</div>
          </div>
        </div>
        <div class="detail-stat-card">
          <canvas id="marksRing" width="90" height="90"></canvas>
          <div class="detail-stat-info">
            <div class="detail-stat-label">Overall Marks</div>
            <div class="detail-stat-value" id="detailMarks">0/0</div>
            <div class="detail-stat-sub" id="detailAssessments">0 assessments</div>
          </div>
        </div>
        <div class="detail-stat-card best-score-card">
          <div class="best-score-icon">🏆</div>
          <div class="detail-stat-info">
            <div class="detail-stat-label">Best Score</div>
            <div class="detail-stat-value" id="detailBestScore">No data</div>
          </div>
        </div>
      </div>

      <div class="assessments-section">
        <div class="assessments-header">
          <div class="dash-section-label" style="margin:0;">Assessments</div>
          <button class="add-btn" id="addAssessmentBtn">+ Add Assessment</button>
        </div>

        <div class="add-form" id="addForm" style="display:none;">
          <div class="form-row">
            <div class="form-group full">
              <label>Title *</label>
              <input type="text" id="formTitle" placeholder="e.g. Assignment 1, Quiz 2..."/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="formCategory">
                <option>Assignment</option>
                <option>Lab Record</option>
                <option>CAT-1</option>
                <option>CAT-2</option>
                <option>Semester</option>
              </select>
            </div>
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="formDate"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Marks Obtained *</label>
              <input type="number" id="formObtained" placeholder="e.g. 18"/>
            </div>
            <div class="form-group">
              <label>Out Of *</label>
              <input type="number" id="formOutOf" placeholder="e.g. 20"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full">
              <label>Notes</label>
              <input type="text" id="formNotes" placeholder="Optional notes..."/>
            </div>
          </div>
          <div class="form-actions">
            <button class="save-btn" id="saveAssessmentBtn">Save</button>
            <button class="cancel-btn" id="cancelAssessmentBtn">Cancel</button>
          </div>
        </div>

        <div id="assessmentsList"></div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
  <script>
    // Theme
    const saved = localStorage.getItem('site_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.querySelectorAll('.theme-toggle').forEach(t => t.textContent = saved === 'dark' ? '🌙' : '☀️');
    document.querySelectorAll('.theme-toggle').forEach(t => {
      t.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        document.querySelectorAll('.theme-toggle').forEach(x => x.textContent = next === 'dark' ? '🌙' : '☀️');
        localStorage.setItem('site_theme', next);
      });
    });
  </script>
</body>
</html>
